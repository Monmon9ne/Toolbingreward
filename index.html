<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Reward VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    overflow:hidden;
}

.topbar{
    width:100%;
    height:80px;
    background:#111827;
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px;
    border-bottom:2px solid #1e293b;
}

button{
    height:50px;
    padding:0 24px;
    border:none;
    border-radius:14px;
    font-size:18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.rewardBtn{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.browserBtn{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.generateBtn{
    background:linear-gradient(135deg,#10b981,#059669);
    display:none;
}

.viewer{
    width:100%;
    height:calc(100vh - 80px);
    position:relative;
}

iframe{
    width:100%;
    height:100%;
    border:none;
    display:none;
    background:white;
}

iframe.active{
    display:block;
}

.home{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:25px;
    color:white;
    text-align:center;
    padding:20px;
}

.home h1{
    font-size:55px;
    background:linear-gradient(135deg,#3b82f6,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    font-weight:900;
}

.home p{
    font-size:28px;
    color:#cbd5e1;
    font-weight:bold;
}

.glow{
    width:170px;
    height:170px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    box-shadow:
        0 0 50px #2563eb,
        0 0 100px #7c3aed;
    animation:spin 6s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<div class="topbar">

    <button
        class="rewardBtn"
        onclick="openReward()">

        Microsoft Reward

    </button>

    <button
        class="browserBtn"
        onclick="showBrowser()">

        Microsoft Browser

    </button>

    <button
        class="generateBtn"
        id="generateBtn"
        onclick="generateSearch()">

        Generate Search

    </button>

</div>

<div class="viewer">

    <div class="home" id="home">

        <div class="glow"></div>

        <h1>
            TOOL MAKE BY<br>
            MONHUB / PICOBLOX
        </h1>

        <p>
            ON TIKTOK
        </p>

    </div>

    <iframe
        id="browser">
    </iframe>

</div>

<script>
const browser =
    document.getElementById("browser")

const generateBtn =
    document.getElementById("generateBtn")

const home =
    document.getElementById("home")

function openReward(){

    window.open(
        "https://rewards.bing.com",
        "_blank"
    )
}

function showBrowser(){

    home.style.display = "flex"

    browser.classList.remove("active")

    generateBtn.style.display = "block"
}

const words = [
"technology","gaming","minecraft","roblox","coding",
"internet","network","science","history","music",
"movie","travel","weather","sports","space",
"planet","future","quantum","energy","android",
"windows","linux","security","developer","python",
"javascript","lua","server","database","cloud",
"bitcoin","tesla","nasa","rocket","physics",
"chemistry","biology","fitness","football","anime",
"tokyo","vietnam","america","pizza","coffee",
"holiday","concert","camera","drone","robot",
"machine","algorithm","storage","mobile","website",
"google","bing","microsoft","openai","chatgpt",
"discord","telegram","facebook","instagram","reddit"
]

while(words.length < 900){

    const random =
        Math.random()
        .toString(36)
        .substring(2,10)

    words.push(random)
}

function randomWord(){

    return words[
        Math.floor(
            Math.random() * words.length
        )
    ]
}

function generateSearch(){

    const query = randomWord()

    home.style.display = "none"

    browser.classList.add("active")

    browser.src =
        "https://www.bing.com/search?q=" +
        encodeURIComponent(query)
}
</script>

</body>
</html>
