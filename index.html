<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Microsoft Reward VIP</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    overflow:hidden;
}

.topbar{
    width:100%;
    height:80px;
    background:#111827;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    padding:15px;
    border-bottom:2px solid #1e293b;
}

button{
    height:55px;
    padding:0 28px;
    border:none;
    border-radius:16px;
    font-size:20px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    transform:scale(1.05);
}

.rewardBtn{
    background:linear-gradient(135deg,#2563eb,#7c3aed);
}

.generateBtn{
    background:linear-gradient(135deg,#10b981,#059669);
}

.main{
    width:100%;
    height:calc(100vh - 80px);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    gap:30px;
    color:white;
    text-align:center;
    padding:20px;
}

.glow{
    width:180px;
    height:180px;
    border-radius:50%;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    box-shadow:
        0 0 60px #2563eb,
        0 0 120px #7c3aed;
    animation:spin 6s linear infinite;
}

@keyframes spin{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

h1{
    font-size:58px;
    font-weight:900;
    background:linear-gradient(135deg,#3b82f6,#a855f7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

p{
    font-size:28px;
    color:#cbd5e1;
    font-weight:bold;
}

.searchBox{
    width:90%;
    max-width:900px;
    min-height:70px;
    background:#111827;
    border:2px solid #374151;
    border-radius:18px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px;
    font-size:28px;
    font-weight:bold;
    color:#10b981;
    word-break:break-word;
    box-shadow:0 0 25px rgba(16,185,129,.4);
}
</style>
</head>
<body>

<div class="topbar">

    <button
        class="rewardBtn"
        onclick="openReward()">

        Microsoft Reward

    </button>

    <button
        class="generateBtn"
        onclick="generateSearch()">

        Generate Search

    </button>

</div>

<div class="main">

    <div class="glow"></div>

    <h1>
        TOOL MAKE BY<br>
        MONHUB / PICOBLOX
    </h1>

    <p>
        ON TIKTOK
    </p>

    <div
        class="searchBox"
        id="searchBox">

        READY...

    </div>

</div>

<script>
function openReward(){

    window.open(
        "https://rewards.bing.com",
        "_blank"
    )
}

const words = [
"technology","gaming","minecraft","roblox","coding",
"internet","network","science","history","music",
"movie","travel","weather","sports","space",
"planet","future","quantum","energy","android",
"windows","linux","security","developer","python",
"javascript","lua","server","database","cloud",
"bitcoin","tesla","nasa","rocket","physics",
"chemistry","biology","fitness","football","anime",
"tokyo","vietnam","america","pizza","coffee",
"holiday","concert","camera","drone","robot",
"machine","algorithm","storage","mobile","website",
"google","bing","microsoft","openai","chatgpt",
"discord","telegram","facebook","instagram","reddit"
]

while(words.length < 900){

    const random =
        Math.random()
        .toString(36)
        .substring(2,10)

    words.push(random)
}

function randomWord(){

    return words[
        Math.floor(
            Math.random() * words.length
        )
    ]
}

function generateSearch(){

    const query = randomWord()

    document.getElementById(
        "searchBox"
    ).innerText = query

    window.open(
        "https://www.bing.com/search?q=" +
        encodeURIComponent(query),
        "_blank"
    )
}
</script>

</body>
</html>
